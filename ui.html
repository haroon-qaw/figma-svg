<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; font-size: 13px; padding: 16px; background: #fff; color: #333; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    button {
      width: 100%; padding: 8px; background: #18a0fb; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: #0d8de0; }
    #output {
      margin-top: 12px; display: none; flex-direction: column; gap: 8px;
    }
    .svg-block {
      border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden;
    }
    .svg-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: #f5f5f5; font-weight: 500;
    }
    .copy-btn {
      width: auto; padding: 3px 10px; font-size: 11px; background: #333; border-radius: 4px;
    }
    .copy-btn:hover { background: #000; }
    textarea {
      width: 100%; height: 100px; padding: 8px; border: none;
      font-family: monospace; font-size: 11px; resize: vertical; outline: none;
    }
    .error { color: #e03; margin-top: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Copy as SVG with currentColor</h2>

  <div class="options">
    <label><input type="checkbox" id="fills" checked> Replace fills with currentColor</label>
    <label><input type="checkbox" id="strokes" checked> Replace strokes with currentColor</label>
  </div>

  <button id="exportBtn">Export Selected</button>
  <div id="error" class="error"></div>
  <div id="output"></div>

  <script>
    document.getElementById('exportBtn').addEventListener('click', () => {
      document.getElementById('error').textContent = '';
      document.getElementById('output').style.display = 'none';
      document.getElementById('output').innerHTML = '';

      parent.postMessage({
        pluginMessage: {
          type: 'export',
          options: {
            replaceFills: document.getElementById('fills').checked,
            replaceStrokes: document.getElementById('strokes').checked,
          }
        }
      }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'error') {
        document.getElementById('error').textContent = msg.message;
        return;
      }

      if (msg.type === 'result') {
        const output = document.getElementById('output');
        output.style.display = 'flex';

        msg.results.forEach(({ name, svg }) => {
          const block = document.createElement('div');
          block.className = 'svg-block';

          const header = document.createElement('div');
          header.className = 'svg-header';
          header.innerHTML = `<span>${name}</span>`;

          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(svg).then(() => {
              copyBtn.textContent = 'Copied!';
              setTimeout(() => copyBtn.textContent = 'Copy', 1500);
            });
          });

          header.appendChild(copyBtn);

          const ta = document.createElement('textarea');
          ta.value = svg;
          ta.readOnly = true;

          block.appendChild(header);
          block.appendChild(ta);
          output.appendChild(block);
        });
      }
    };
  </script>
</body>
</html>
