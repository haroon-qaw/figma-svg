<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; font-size: 13px; padding: 16px; background: #fff; color: #333; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    button {
      width: 100%; padding: 8px; background: #18a0fb; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: #0d8de0; }
    #output {
      margin-top: 12px; display: none; flex-direction: column; gap: 8px;
    }
    .error { margin-top: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Copy as SVG with currentColor</h2>

  <div class="options">
    <label><input type="checkbox" id="fills" checked> Replace fills with currentColor</label>
    <label><input type="checkbox" id="strokes" checked> Replace strokes with currentColor</label>
    <label><input type="checkbox" id="masks"> Replace colors inside masks/clipPaths</label>
  </div>

  <button id="exportBtn">Copy SVG</button>
  <div id="status" class="error"></div>

  <script>

    document.getElementById('exportBtn').addEventListener('click', () => {
      document.getElementById('status').textContent = '';

      parent.postMessage({
        pluginMessage: {
          type: 'export',
          options: {
            replaceFills: document.getElementById('fills').checked,
            replaceStrokes: document.getElementById('strokes').checked,
            replaceMasks: document.getElementById('masks').checked,
          }
        }
      }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      const status = document.getElementById('status');

      if (msg.type === 'error') {
        status.style.color = '#e03';
        status.textContent = msg.message;
        return;
      }

      if (msg.type === 'result') {
        const svg = msg.results.map(r => r.svg).join('\n');
        const ta = document.createElement('textarea');
        ta.value = svg;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        status.style.color = '#1a7';
        status.textContent = '✓ Copied to clipboard!';
        setTimeout(() => status.textContent = '', 2000);
      }
    };
  </script>
</body>
</html>
