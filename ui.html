<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --color-primary:     #3b0fc0;
      --color-primary-hover: #4c27c9;
      --color-primary-active: #2d0b94;
      --color-text:        #111;
      --color-text-secondary: #444;
      --color-text-muted:  #888;
      --color-text-explainer: #555;
      --color-success:     rgb(44, 138, 75);
      --color-error:       rgb(167, 21, 21);
      --color-border:      #dfd7ff;

      --font-size-title:   16px;
      --font-size-body:    16px;
      --font-size-small:   16px;
      --font-size-xs:      12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Inter, sans-serif; font-size: 13px; padding: 32px 32px 16px 32px;
      background: #EBEEF7; color: var(--color-text);
      display: flex; flex-direction: column;
    }
    h2 { font-size: var(--font-size-title); font-weight: 700; margin-bottom: 8px; }
    .description { font-size: var(--font-size-small); color: var(--color-text-secondary); margin-bottom: 20px; line-height: 1.5; }
    hr { border: none; border-top: 1px solid var(--color-border); margin: 0 0 20px 0; }

    .options { display: flex; flex-direction: column; gap: 14px; flex: 1; }

    .option-row { display: flex; flex-direction: column; gap: 4px; }
    .option-row label {
      display: flex; align-items: center; gap: 10px;
      font-size: var(--font-size-body); font-weight: 500; cursor: pointer;
    }
    input[type="checkbox"] {
      width: 20px; height: 20px; flex-shrink: 0;
      accent-color: var(--color-primary); cursor: pointer;
    }

    .what-link {
      font-size: var(--font-size-xs); color: var(--color-text-muted);
      margin-left: 30px; cursor: pointer; text-decoration: none; display: inline-block;
      transition: color 0.1s ease, text-decoration-color 0.2s ease;
    }
    .what-link:hover { color: var(--color-primary); text-decoration: underline; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .overlay.open .overlay-backdrop { opacity: 1; }
    .overlay-card-wrap {
      width: 100%;
      height: 60vh;
      overflow: hidden;
      position: relative;
    }
    .overlay-card {
      position: relative;
      width: 100%;
      height: calc(60vh + 80px);
      background: #EBEEF7;
      border-radius: 12px 12px 0 0;
      padding: 12px 12px 24px 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .overlay.open.overlay-visible .overlay-card {
      transform: translateY(0);
    }
    .overlay-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      color: #111;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .overlay-close:hover {
      background: rgba(0, 0, 0, 0.06);
    }
    .overlay-close-icon {
      font-size: 24px;
      line-height: 1;
      color: #111;
      font-weight: 300;
    }
    .overlay-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: 44px;
    }
    .overlay-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 12px;
    }
    .overlay-body {
      font-size: 16px;
      color: var(--color-text-explainer);
      line-height: 1.6;
      text-align: left;
    }
    .overlay-body p + p { margin-top: 10px; }

    .footer { padding-top: 16px; }
    button {
      width: 100%; padding: 16px; background: var(--color-primary); color: #fff;
      border: none; border-radius: 8px; cursor: pointer; font-size: var(--font-size-body); font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background 0.2s ease;
    }
    button:hover { background: var(--color-primary-hover); }
    button:active { background: var(--color-primary-active); }
    #status { margin-top: 8px; font-size: var(--font-size-xs); min-height: 16px; }

    .code-term {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
      font-size: 0.9em;
      background: #324068;
      color: #9CE05D;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>Copy as SVG with 'currentColor'</h2>
  <p class="description">In an SVG, <span class="code-term">currentColor</span> makes fill or stroke inherit the element's CSS color value.</p>
  <hr>
  <div class="options">
    <div class="option-row">
      <label><input type="checkbox" id="fills" checked> Replace fills</label>
    </div>

    <div class="option-row">
      <label><input type="checkbox" id="strokes" checked> Replace strokes</label>
    </div>

    <div class="option-row">
      <label><input type="checkbox" id="masks"> Replace colors inside Masks/ClipPaths</label>
      <a class="what-link" id="whatLinkMasks">Learn more</a>
    </div>

    <div class="option-row">
      <label><input type="checkbox" id="responsive"> Make SVG responsive</label>
      <a class="what-link" id="whatLinkResponsive">Learn more</a>
    </div>
  </div>

  <div class="overlay" id="explainerOverlay">
    <div class="overlay-backdrop" id="overlayBackdrop"></div>
    <div class="overlay-card-wrap">
    <div class="overlay-card">
      <button type="button" class="overlay-close" id="overlayClose" aria-label="Close">
        <span class="overlay-close-icon" aria-hidden="true">×</span>
      </button>
      <div class="overlay-content">
        <h3 class="overlay-title" id="overlayTitle"></h3>
        <div class="overlay-body" id="overlayBody"></div>
      </div>
    </div>
    </div>
  </div>

  <div class="footer">
    <button id="exportBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy SVG
    </button>
    <div id="status"></div>
  </div>

  <script>
    const overlay = document.getElementById('explainerOverlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayBody = document.getElementById('overlayBody');
    const overlayClose = document.getElementById('overlayClose');

    const explainers = {
      masks: { title: 'Replace colors inside Masks/ClipPaths', body: '<p>Masks and <span class="code-term">clipPaths</span> rely on specific colors for visibility.</p><p>Converting them to <span class="code-term">currentColor</span> may change how they behave.</p>' },
      responsive: { title: 'Make SVG responsive', body: '<p>Make the SVG scale to its parent by using a <span class="code-term">viewBox</span> and removing fixed <span class="code-term">width</span> & <span class="code-term">height</span>.</p>' }
    };

    function openOverlay(title, bodyHtml) {
      overlayTitle.textContent = title;
      overlayBody.innerHTML = bodyHtml;
      overlay.classList.add('open');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => overlay.classList.add('overlay-visible'));
      });
    }
    function closeOverlay() {
      overlay.classList.remove('overlay-visible');
      const card = overlay.querySelector('.overlay-card');
      card.addEventListener('transitionend', function onClosed(e) {
        if (e.propertyName === 'transform') {
          overlay.classList.remove('open');
          card.removeEventListener('transitionend', onClosed);
        }
      });
    }

    document.getElementById('whatLinkMasks').addEventListener('click', (e) => {
      e.preventDefault();
      openOverlay(explainers.masks.title, explainers.masks.body);
    });
    document.getElementById('whatLinkResponsive').addEventListener('click', (e) => {
      e.preventDefault();
      openOverlay(explainers.responsive.title, explainers.responsive.body);
    });
    overlayClose.addEventListener('click', closeOverlay);
    document.getElementById('overlayBackdrop').addEventListener('click', closeOverlay);

    document.getElementById('exportBtn').addEventListener('click', () => {
      document.getElementById('status').textContent = '';
      parent.postMessage({
        pluginMessage: {
          type: 'export',
          options: {
            replaceFills: document.getElementById('fills').checked,
            replaceStrokes: document.getElementById('strokes').checked,
            replaceMasks: document.getElementById('masks').checked,
            responsive: document.getElementById('responsive').checked,
          }
        }
      }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      const status = document.getElementById('status');

      if (msg.type === 'error') {
        status.style.color = 'var(--color-error)';
        status.textContent = msg.message;
        return;
      }

      if (msg.type === 'result') {
        const svg = msg.results.map(r => r.svg).join('\n');
        const ta = document.createElement('textarea');
        ta.value = svg;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        status.style.color = 'var(--color-success)';
        status.textContent = '✓ Copied to clipboard!';
        setTimeout(() => status.textContent = '', 2000);
      }
    };
  </script>
</body>
</html>
